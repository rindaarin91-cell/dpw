\<!DOCTYPE html>
<html>

<head>
    <title>Progress Download jQuery</title>

    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .progress-label {
            margin-bottom: 10px;
            text-align: center;
        }

        #progressbar {
            height: 20px;
        }
    </style>
</head>

<body>

    <div id="download-dialog" title="File Download">
        <div class="progress-label">Starting download...</div>
        <div id="progressbar"></div>
    </div>

    <script>
        $(function () {

            var progressbar = $("#progressbar"),
                progressLabel = $(".progress-label");

            progressbar.progressbar({
                value: false,
                change: function () {
                    progressLabel.text("Download Progress: " + progressbar.progressbar("value") + "%");
                },
                complete: function () {
                    progressLabel.text("Download Complete!");
                }
            });

            function progress() {
                var val = progressbar.progressbar("value") || 0;

                progressbar.progressbar("value", val + 2);

                if (val < 99) {
                    setTimeout(progress, 80);
                }
            }

            $("#download-dialog").dialog();

            setTimeout(progress, 1000);

        });
    </script>

</body>

</html>
