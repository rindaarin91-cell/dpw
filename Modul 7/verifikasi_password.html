<!DOCTYPE html>
<html>

<head>
    <title>Cek Password</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 90%;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #pesan {
            margin-top: 15px;
            padding: 10px;
            display: none;
            border-radius: 5px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }
    </style>
</head>

<body>

    <div class="container">
        <h3>Cek Password</h3>

        <input type="password" id="password1" placeholder="Masukkan password">
        <input type="password" id="password2" placeholder="Ulangi password">

        <button onclick="cekPassword()">Proses</button>

        <div id="pesan"></div>
    </div>

    <script>
        function cekPassword() {
            let pass1 = document.getElementById("password1").value;
            let pass2 = document.getElementById("password2").value;
            let pesan = document.getElementById("pesan");

            if (pass1 === "" || pass2 === "") {
                pesan.innerHTML = "⚠️ Password tidak boleh kosong!";
                pesan.className = "error";
            } else if (pass1 !== pass2) {
                pesan.innerHTML = "❌ Password tidak sama!";
                pesan.className = "error";
            } else {
                pesan.innerHTML = "✅ Password cocok!";
                pesan.className = "success";

                // simulasi redirect
                setTimeout(() => {
                    window.location.href = "alert.html";
                }, 1500);
            }

            pesan.style.display = "block";
        }
    </script>

</body>

</html>
