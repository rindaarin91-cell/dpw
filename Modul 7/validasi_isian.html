<!DOCTYPE html>
<html>

<head>
    <title>Validasi Masukan</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 8px;
            width: 90%;
            margin-top: 10px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #pesan {
            margin-top: 15px;
            padding: 10px;
            display: none;
            border-radius: 5px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }
    </style>
</head>

<body>

    <div class="container">
        <h3>Form Validasi</h3>

        <input type="text" id="nama" placeholder="Masukkan nama">

        <button onclick="cekNama()">Kirim</button>

        <div id="pesan"></div>
    </div>

    <script>
        function cekNama() {
            let nama = document.getElementById("nama").value.trim();
            let pesan = document.getElementById("pesan");

            if (nama === "") {
                pesan.innerHTML = "⚠️ Nama harus diisi!";
                pesan.className = "error";
            } else {
                pesan.innerHTML = "✅ Terima kasih, " + nama + "!";
                pesan.className = "success";
            }

            pesan.style.display = "block";
        }
    </script>

</body>

</html>
