<!DOCTYPE html>
<html>

<head>
    <title>Confirm Box Arinda</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background: #f4f6f9;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #e74c3c;
            color: white;
        }

        #demo {
            margin-top: 20px;
            font-size: 18px;
            padding: 10px;
            display: none;
            border-radius: 5px;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .cancel {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>

    <h2>Confirm Box Arinda</h2>
    <button onclick="myFunction()">Logout</button>

    <p id="demo"></p>

    <script>
        function myFunction() {
            let hasil = confirm("Apakah Anda yakin ingin logout?");
            let output = document.getElementById("demo");

            if (hasil) {
                output.innerHTML = "✅ Anda berhasil logout";
                output.className = "success";
            } else {
                output.innerHTML = "❌ Logout dibatalkan";
                output.className = "cancel";
            }

            output.style.display = "block";
        }
    </script>

</body>

</html>
