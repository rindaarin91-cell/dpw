<!DOCTYPE html>
<html>

<head>
    <title>Program Menu jQuery</title>

    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
        }

        .ui-menu {
            width: 220px;
            border: 1px solid #000;
        }
    </style>
</head>

<body>

    <h2>Menu Navigasi jQuery</h2>

    <!-- ID diperbaiki -->
    <ul id="menu">
        <li>
            <div>Beranda</div>
        </li>

        <li>
            <div>Profil Produk</div>
            <ul>
                <li><div>Elektronik</div></li>
                <li><div>Pakaian</div></li>
                <li><div>Otomotif</div></li>
            </ul>
        </li>

        <li>
            <div>Kontak Kami</div>
        </li>

        <li class="ui-state-disabled">
            <div>Layanan Segera Hadir</div>
        </li>
    </ul>

    <script>
        $(function () {
            $("#menu").menu();
        });
    </script>

</body>

</html>
