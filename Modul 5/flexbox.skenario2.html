<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flexbox Arinda Skenario 2 </title>

<style>

    .wadah_flex{
        display: flex;
        background-color: lightblue;
    }

    .wadah_flex div{
        background-color: orange;
        margin: 10px;
        padding: 10px;
        font-size: 30px;
    }

</style>
</head>

<body>

<p><b>SKENARIO 2</b></p>

<div class="wadah_flex">
<div>1</div>
<div>2</div>
<div>3</div>
</div>

<p>
Kesimpulan skenario 2 adalah: Penambahan style pada setiap div
 membuat tampilan kotak lebih jelas, memiliki jarak antar elemen, dan ukuran teks lebih besar sehingga tampilan lebih rapi.
</p>

</body>
</html>
