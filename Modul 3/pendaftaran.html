<article>

<h1>Form Pendaftaran</h1>

<form>

        <label>No. Telepon </label><br>
        <input type="tel" pattern="[0-9]{4}-[0-9]{6}" placeholder="0812-123456" required>
        <br><br>

        <label>Alamat Email</label><br>
        <input type="email" placeholder="nama@domain.com" required>
        <br><br>

        <label>Tanggal Lahir</label><br>
        <input type="date" min="1987-01-01" max="1993-01-01" required>
        <br><br>

        <label>Tingkat Kepentingan (0 = Tidak Penting, 10 = Mendesak)</label><br>
        <input type="range" min="0" max="10">
        <br><br>

        <label>Tanggal Kunjungan (harus setelah hari ini)</label><br>
        <input type="date" min="2026-03-13" required>
        <br><br>

        <label>Jam Kunjungan (17:00 - 21:00 WIB)</label><br>
        <input type="time" min="17:00" max="21:00" required>
        <br><br>

<input type="submit" value="Daftar">

</form>
