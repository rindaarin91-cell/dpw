<!DOCTYPE html>
<html>
<head>
    <title>Latihan 2.7 - Image Map</title>
</head>
<body>

    <div id="header">
        <h1>UJICOBA IMAGE MAP</h1>
    </div>

    <div id="link">
        <a href="#">Home</a> |
        <a href="#">Profil</a> |
        <a href="#">Kontak</a>
    </div>

    <div id="content">

        <h2>Klik pada bagian gambar:</h2>

        <img src="https://www.w3schools.com/html/workplace.jpg" 
             alt="Workplace" 
             usemap="#workmap"
             width="400">

        <map name="workmap">
            <area shape="rect" coords="34, 44,270, 350" alt="Computer" href="https://en.wikipedia.org/wiki/Computer">
        <area shape="rect" coords="290,172, 333, 250" alt="Phone" href="https://en.wikipedia.org/wiki/Telephone">
        <area shape="circle" coords="337, 300,44" alt="Coffee" href="https://en.wikipedia.org/wiki/Coffee">
        </map>

        <p>
            Kesimpulan: Tag map dan area digunakan untuk membuat
            bagian tertentu dari gambar bisa diklik. Setiap area
            dapat diarahkan ke link yang berbeda.
        </p>

    </div>

    <div id="footer">
        <p><i>@ArindaMardianti</i></p>
    </div>

</body>
</html>
