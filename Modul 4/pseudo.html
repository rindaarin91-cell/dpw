<!DOCTYPE html>
<html>
<head>
    <title>Belajar Pseudo-class</title>
    <style>
        p {
            display: none;
            background-color: darkgray;
            padding: 20px;
        }

        div:hover p {
            display: block;
        }
        
        a:link {
            color: blue;
            text-decoration: none;
        }

        a:hover {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div>
    Letakkan kursor disini untuk melihat div element
    <p>Saya adalah Arinda Cantik </p>
</div>

<br><br>

<a href="#">Contoh Link (Arahkan mouse ke sini)</a>

</body>
</html>

<p>Paragraf yang ada di dalam div 
    akan tersembunyi terlebih dahulu dan muncul ketika kursor diarahkan ke div</p>
